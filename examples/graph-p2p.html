<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Simulación D3 P2PGraph (RT) · Cellular Mesh</title>
  <style>
    :root {
      --bg: #009dff;
      --me: #FFFF00;
      --peer: #00FF00;
      --bridge: #FFA500;
      --server: #E040FB;
      --link: rgba(255, 255, 255, 0.7);
    }
    body { margin: 0; font-family: system-ui, sans-serif; background: #f0f0f0; }
    .graph-container { width: 400px; height: 400px; margin: 20px 20px 8px; background: var(--bg); border-radius: 8px; overflow: hidden; }
    svg { width: 100%; height: 100%; }
    line { stroke: var(--link); stroke-width: 1px; }
    line.bridge { stroke: var(--bridge); stroke-width: 1.5px; stroke-dasharray: 4 3; }
    circle.me { fill: var(--me); }
    circle.me.bridge { stroke: var(--bridge); stroke-width: 3px; }
    circle.peer { fill: var(--peer); }
    circle.peer.bridge { fill: var(--bridge); }
    circle.peer.server { fill: var(--server); }
    text { font-size: 10px; fill: #000; pointer-events: none; }
    .legend { display: flex; gap: 14px; margin: 0 20px 20px; font-size: 12px; color: #333; align-items: center; }
    .legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; vertical-align: -1px; }
    .legend .dot.me { background: var(--me); }
    .legend .dot.peer { background: var(--peer); }
    .legend .dot.bridge { background: var(--bridge); }
    .legend .dot.server { background: var(--server); }
    .legend .dash { display: inline-block; width: 18px; border-top: 2px dashed var(--bridge); margin-right: 4px; vertical-align: 3px; }
  </style>
</head>
<body>
  <div class="graph-container" id="graph"></div>
  <div class="legend">
    <span><i class="dot me"></i>You</span>
    <span><i class="dot peer"></i>Peer</span>
    <span><i class="dot bridge"></i>Bridge</span>
    <span><i class="dot server"></i>Server</span>
    <span><i class="dash"></i>Cross-cell link</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script type="module">
    /**
     * Real-time peers graph using GenosDB (GenosRTC Cellular Mesh) + D3.
     * - One local node ('me') and one link per connected peer.
     * - Bridge peers and cross-cell links are styled from the engine's
     *   gossiped state (mesh:state / mesh:peer-state) — never recomputed.
     * - Updates on 'peer:join' / 'peer:leave' / 'mesh:*' events.
     * - A Fallback Server announces type 'superpeer' on peer:join and is
     *   drawn as a bigger violet node.
     * Compact ES2020+ style per your rules.
     */

    // 1) Load GenosDB with RTC + Cellular Mesh enabled (room = db.room)

    import { gdb } from "../dist/index.js"

    const db = await gdb("p2pgraph-demo", {
      rtc: { cells: { cellSize: 'auto', bridgesPerEdge: 2 } }
    }); // room id = db name

    // 2) D3 setup
    const size = 400, rMe = 10, rPeer = 6, rServer = 8;
    const svg = d3.select('#graph').append('svg').attr('viewBox', `0 0 ${size} ${size}`);
    const linkG = svg.append('g'), nodeG = svg.append('g'), labelG = svg.append('g');

    // 3) In-memory state (Maps for O(1) upserts)
    const nodes = new Map([['me', { id: 'me', me: true }]]);
    const links = new Map(); // key: `me->peerId`

    // Cellular state, straight from the engine (never recomputed here)
    let selfState = { cellId: null, isBridge: false, bridges: [] };
    const peerStates = new Map(); // peerId -> { cellId, bridges }
    const peerTypes = new Map();  // peerId -> 'superpeer' (Fallback Server)
    const isServer = d => peerTypes.get(d.id) === 'superpeer';
    const isBridgePeer = st => !!(st?.isBridge || st?.bridges?.length);
    const stateOf = d => d.me ? selfState : peerStates.get(d.id);
    const isCrossCell = pid => {
      const pc = peerStates.get(pid)?.cellId;
      return !!(pc && selfState.cellId && pc !== selfState.cellId);
    };
    const cellTag = st => st?.cellId ? ` ${st.cellId.replace('cell-', 'C')}` : '';

    // 4) D3 force simulation
    const sim = d3.forceSimulation([...nodes.values()])
      .force('link', d3.forceLink([...links.values()]).id(d => d.id).distance(80).strength(0.2))
      .force('charge', d3.forceManyBody().strength(-200))
      .force('center', d3.forceCenter(size/2, size/2))
      .force('collide', d3.forceCollide().radius(20))
      .on('tick', () => {
        linkSel
          .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        nodeSel
          .attr('cx', d => d.x).attr('cy', d => d.y);
        labelSel
          .attr('x', d => d.x).attr('y', d => d.y + 14);
      });

    // 5) Selections (initialized empty, joined in render())
    let linkSel = linkG.selectAll('line'), nodeSel = nodeG.selectAll('circle'), labelSel = labelG.selectAll('text');

    // 6) Helpers
    const keyLink = pid => `me->${pid}`;
    const short = id => id === 'me' ? 'You' : (id?.slice(0,6) ?? 'peer');

    const upsertPeer = peerId => {
      if (!nodes.has(peerId)) nodes.set(peerId, { id: peerId });
      links.set(keyLink(peerId), { source: 'me', target: peerId });
      render(true);
    };

    const removePeer = peerId => {
      nodes.delete(peerId); links.delete(keyLink(peerId));
      render(true);
    };

    const drag = d3.drag()
      .on('start', (ev, d) => { if (!ev.active) sim.alpha(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
      .on('end',  (_, d) => { d.fx = null; d.fy = null; });

    const render = (kick=false) => {
      const N = [...nodes.values()], L = [...links.values()];
      linkSel = linkG.selectAll('line').data(L, d => `${d.source.id ?? d.source}-${d.target.id ?? d.target}`);
      linkSel.exit().remove();
      linkSel = linkSel.enter().append('line').merge(linkSel)
        .attr('class', d => isCrossCell(d.target.id ?? d.target) ? 'bridge' : null);

      nodeSel = nodeG.selectAll('circle').data(N, d => d.id);
      nodeSel.exit().remove();
      nodeSel = nodeSel.enter().append('circle')
        .call(drag)
        .merge(nodeSel)
        .attr('r', d => d.me ? rMe : isServer(d) ? rServer : rPeer)
        .attr('class', d => (d.me ? 'me' : 'peer') + (isBridgePeer(stateOf(d)) ? ' bridge' : '') + (isServer(d) ? ' server' : ''));

      labelSel = labelG.selectAll('text').data(N, d => d.id);
      labelSel.exit().remove();
      labelSel = labelSel.enter().append('text')
        .attr('dy', 4).attr('text-anchor', 'middle')
        .merge(labelSel).text(d => short(d.id) + cellTag(stateOf(d)));

      // Rebind sim data efficiently
      sim.nodes(N);
      sim.force('link').links(L);
      if (kick) sim.alpha(0.7).restart();
    };

    // 7) Seed with current peers (getPeers() returns a plain object)
    Object.keys(db.room.getPeers?.() ?? {}).forEach(upsertPeer);

    // 8) Real-time: peers join/leave + cellular state gossip
    db.room.on?.('peer:join', (id, type) => { if (type) peerTypes.set(id, type); upsertPeer(id); });
    db.room.on?.('peer:leave', id => { peerStates.delete(id); peerTypes.delete(id); removePeer(id); });
    db.room.on?.('mesh:state', st => { selfState = st; render(); });
    db.room.on?.('mesh:peer-state', st => {
      if (st.id === db.selfId) return;
      peerStates.set(st.id, { cellId: st.cell, bridges: st.bridges ?? [] });
      render();
    });

    // 9) First paint
    render(true);

    // 10) Cleanup (optional)
    addEventListener('beforeunload', () => db.room?.leave?.());
  </script>
</body>
</html>
