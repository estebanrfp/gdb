<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Location Sharing — powered by GenosDB</title>
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* Dark tech look with neon accents */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #0a0a0a; /* Deep black background */
            color: #ffffff; /* White text for contrast */
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #map {
            flex: 1;
            border: 2px solid #00ffcc; /* Neon cyan border */
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.5); /* Glowing effect */
        }

        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background-color: rgba(10, 10, 10, 0.8); /* Semi-transparent dark panel */
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3); /* Neon glow */
        }

        button {
            background-color: #00ffcc; /* Neon cyan */
            color: #0a0a0a;
            border: none;
            padding: 10px 20px;
            margin: 5px 0;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        button:hover {
            background-color: #00cc99; /* Darker neon on hover */
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.7);
        }

        button:disabled {
            background-color: #333333;
            cursor: not-allowed;
        }

        #status {
            margin-top: 10px;
            font-size: 14px;
            color: #00ffcc; /* Neon text */
        }

        #peer-list {
            margin-top: 10px;
            font-size: 12px;
            max-height: 100px;
            overflow-y: auto;
        }

        .peer-item {
            margin: 5px 0;
            color: #ffffff;
        }

        /* Glow on markers for the tech feel */
        .leaflet-marker-icon {
            filter: drop-shadow(0 0 5px #00ffcc);
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="controls">
        <button id="startSharing">Start Sharing Location</button>
        <button id="stopSharing" disabled>Stop Sharing Location</button>
        <div id="status">Status: Not sharing</div>
        <div id="peer-list">Connected Peers: None</div>
    </div>

    <script type="module">
        // P2P live tracking on top of GenosRTC data channels: positions are
        // high-frequency, transient data, so they travel over an ephemeral
        // channel and never touch the graph (no put / no storage writes).
        import { gdb } from "../dist/index.js";
        const db = await gdb('location-share-room', { rtc: true });
        const room = db.room;

        // Initialize Leaflet Map
        const map = L.map('map').setView([0, 0], 2); // World view until the first fix
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Data structures
        const peers = new Map(); // peerId -> { marker, polyline, route: [] }
        const MAX_ROUTE_POINTS = 500; // rolling cap: long sessions stay light
        let myLocationWatcher = null;
        let myRoute = [];
        let myMarker = null;
        let myPolyline = null;
        let myLastPosition = null; // latest fix, re-sent to late joiners
        let centeredOnFirstFix = false; // center once; afterwards the user owns the map
        const locationChannel = room.channel('shareloc');

        // UI Elements
        const startBtn = document.getElementById('startSharing');
        const stopBtn = document.getElementById('stopSharing');
        const statusDiv = document.getElementById('status');
        const peerListDiv = document.getElementById('peer-list');

        // Deterministic neon color per peer so several routes stay distinguishable
        const peerColor = (peerId) => `hsl(${parseInt(peerId.slice(0, 6), 36) % 360}, 100%, 60%)`;
        const dotIcon = (color) => L.divIcon({ html: `<div style="background-color: ${color}; width: 20px; height: 20px; border-radius: 50%;"></div>` });

        // Channel messages come from any peer in a public room — validate them.
        const isValidCoord = (lat, lng) =>
            Number.isFinite(lat) && Number.isFinite(lng) && Math.abs(lat) <= 90 && Math.abs(lng) <= 180;

        // Helper to update peer list UI
        function updatePeerList() {
            peerListDiv.innerHTML = 'Connected Peers:<br>';
            peers.forEach((data, peerId) => {
                const div = document.createElement('div');
                div.className = 'peer-item';
                div.textContent = `Peer ${peerId.slice(0, 8)}...`;
                div.style.color = peerColor(peerId);
                peerListDiv.appendChild(div);
            });
            if (peers.size === 0) {
                peerListDiv.innerHTML = 'Connected Peers: None';
            }
        }

        // Handle peer join — and bring the newcomer up to date: watchPosition only
        // fires on movement, so without this targeted send a late joiner could see
        // an empty map for minutes.
        room.on('peer:join', (peerId) => {
            console.log(`Peer ${peerId} joined.`);
            peers.set(peerId, { marker: null, polyline: null, route: [] });
            updatePeerList();
            if (myLastPosition) locationChannel.send(myLastPosition, peerId);
        });

        // Handle peer leave
        room.on('peer:leave', (peerId) => {
            console.log(`Peer ${peerId} left.`);
            removePeerLayers(peerId);
            peers.delete(peerId);
            updatePeerList();
        });

        function removePeerLayers(peerId) {
            const data = peers.get(peerId);
            if (!data) return;
            if (data.marker) map.removeLayer(data.marker);
            if (data.polyline) map.removeLayer(data.polyline);
            data.marker = null;
            data.polyline = null;
            data.route = [];
        }

        // Receive location updates from peers
        locationChannel.on('message', (data, peerId) => {
            // A peer pressed Stop: clear their footprint
            if (data?.stopped) {
                removePeerLayers(peerId);
                return;
            }
            const { lat, lng } = data ?? {};
            if (!isValidCoord(lat, lng)) return;

            let peerData = peers.get(peerId);
            if (!peerData) {
                peerData = { marker: null, polyline: null, route: [] };
                peers.set(peerId, peerData);
                updatePeerList();
            }
            const color = peerColor(peerId);

            // Update marker
            if (peerData.marker) {
                peerData.marker.setLatLng([lat, lng]);
            } else {
                peerData.marker = L.marker([lat, lng], { icon: dotIcon(color) })
                    .addTo(map).bindPopup(`Peer ${peerId.slice(0, 8)}`);
            }

            // Update route (rolling cap)
            peerData.route.push([lat, lng]);
            if (peerData.route.length > MAX_ROUTE_POINTS) peerData.route.shift();
            if (peerData.polyline) {
                peerData.polyline.setLatLngs(peerData.route);
            } else {
                peerData.polyline = L.polyline(peerData.route, { color, dashArray: '5, 5' }).addTo(map);
            }
        });

        // Start sharing location
        startBtn.addEventListener('click', () => {
            if (!navigator.geolocation) {
                alert('Geolocation not supported.');
                return;
            }
            statusDiv.textContent = 'Status: Requesting location…';
            myLocationWatcher = navigator.geolocation.watchPosition(
                (position) => {
                    const { latitude: lat, longitude: lng } = position.coords;
                    myLastPosition = { lat, lng };

                    // Update own marker and route
                    if (myMarker) {
                        myMarker.setLatLng([lat, lng]);
                    } else {
                        myMarker = L.marker([lat, lng], { icon: dotIcon('#ff00cc') })
                            .addTo(map).bindPopup('You');
                        statusDiv.textContent = 'Status: Sharing location';
                    }

                    myRoute.push([lat, lng]);
                    if (myRoute.length > MAX_ROUTE_POINTS) myRoute.shift();
                    if (myPolyline) {
                        myPolyline.setLatLngs(myRoute);
                    } else {
                        myPolyline = L.polyline(myRoute, { color: '#ff00cc' }).addTo(map);
                    }

                    // Center only on the first fix — afterwards the user owns the
                    // map (constant re-centering would fight panning/zooming to peers)
                    if (!centeredOnFirstFix) {
                        map.setView([lat, lng], 15);
                        centeredOnFirstFix = true;
                    }

                    // Broadcast to every peer in the room
                    locationChannel.send(myLastPosition);
                },
                (error) => {
                    console.error('Geolocation error:', error);
                    statusDiv.textContent = `Status: Location error (${error.message})`;
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                },
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );

            startBtn.disabled = true;
            stopBtn.disabled = false;
        });

        // Stop sharing location — clean up locally and tell peers to do the same
        stopBtn.addEventListener('click', () => {
            if (myLocationWatcher) {
                navigator.geolocation.clearWatch(myLocationWatcher);
                myLocationWatcher = null;
            }
            if (myMarker) { map.removeLayer(myMarker); myMarker = null; }
            if (myPolyline) { map.removeLayer(myPolyline); myPolyline = null; }
            myRoute = [];
            myLastPosition = null;
            centeredOnFirstFix = false;
            locationChannel.send({ stopped: true });
            startBtn.disabled = false;
            stopBtn.disabled = true;
            statusDiv.textContent = 'Status: Not sharing';
        });
    </script>
</body>
</html>
