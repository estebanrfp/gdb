<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Time Geolocation</title>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    #map {
      width: 100%;
      height: 400px;
      border: 1px solid #ccc;
      margin-top: 20px;
    }

    #results {
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <h1>Real-Time Location Detection</h1>
  <p>Your current location will update automatically and nearby nodes will be displayed.</p>

  <div id="status">Searching for location...</div>
  <div id="current-location"></div>

  <div id="map"></div>
  <div id="results"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script type="module">
    // Import gdb and geolocation operators
    import { gdb } from "../dist/index.js";

    // Create a gdb instance with geolocation operators
    const db = await gdb("geolocationDB", { rtc: true, geo: true });

    // db.clear()

    // Simulate nodes around the detected position (fixed offsets + fixed ids,
    // so the demo shows nearby results wherever you are and reloads stay clean).
    // Coordinates live in a nested `location` object — the field the documented
    // geo queries target: { location: { $near: { latitude, longitude, radius } } }
    async function populateSampleData(latitude, longitude) {
      const offsets = [
        { name: "Node A", dLat: 0.05, dLng: 0.03 },    // ~6 km away
        { name: "Node B", dLat: -0.08, dLng: 0.10 },   // ~12 km away
        { name: "Node C", dLat: 0.20, dLng: -0.15 },   // ~26 km away
        { name: "Node D", dLat: 0.90, dLng: 0.60 },    // ~110 km away (outside the 50 km radius)
      ];
      for (const { name, dLat, dLng } of offsets) {
        await db.put({ name, location: { latitude: latitude + dLat, longitude: longitude + dLng } }, name);
      }
    }

    // Get the user's current location
    function getCurrentLocation() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject("Geolocation is not available in this browser.");
        }
        navigator.geolocation.getCurrentPosition(
          (position) => resolve(position),
          (error) => reject(error.message)
        );
      });
    }

    // Display the location on the map using Leaflet
    function displayMap(latitude, longitude, name = "You are here.") {
      const map = L.map('map').setView([latitude, longitude], 11);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
      }).addTo(map);
      L.marker([latitude, longitude])
        .addTo(map)
        .bindPopup(name)
        .openPopup();
      return map;
    }

    // Find nearby nodes using the documented $near operator (radius in km)
    async function findNearbyNodes(latitude, longitude, map) {
      const { results } = await db.map({
        query: {
          location: {
            $near: { latitude, longitude, radius: 50 } // 50 km
          }
        },
        field: "name",
        order: "asc"
      });
      console.log(results);
      const resultsDiv = document.getElementById("results");
      if (results.length > 0) {
        resultsDiv.innerHTML = `<h3>Nearby nodes (within 50 km):</h3><ul>${results
          .map(node => {
            const { latitude: lat, longitude: lng } = node.value.location ?? node.value;
            L.marker([lat, lng]).addTo(map).bindPopup(node.value.name);
            return `<li>${node.value.name} (${lat.toFixed(4)}, ${lng.toFixed(4)})</li>`;
          })
          .join("")}</ul>`;
      } else {
        resultsDiv.innerHTML = "<p>No nearby nodes found.</p>";
      }
    }

    // Initialize the app
    async function initApp() {
      try {
        // Get current location first — sample nodes are seeded around it
        const position = await getCurrentLocation();
        const { latitude, longitude } = position.coords;
        await populateSampleData(latitude, longitude);
        // Show location
        document.getElementById("status").textContent = "Location detected.";
        document.getElementById("current-location").innerHTML = `
          <strong>Latitude:</strong> ${latitude}<br>
          <strong>Longitude:</strong> ${longitude}
        `;
        // Show map and nearby nodes (Node D is seeded ~110 km away on purpose,
        // so the 50 km $near query returns A, B and C but not D)
        const map = displayMap(latitude, longitude);
        await findNearbyNodes(latitude, longitude, map);
      } catch (error) {
        console.error("Error:", error);
        document.getElementById("status").textContent = `Error: ${error}`;
      }
    }
    // Start the app
    initApp();
  </script>
</body>

</html>
