<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GenosDB · Cellular Mesh Reach Probe</title>
  <style>
    :root {
      --bg-primary: #0d0d0d;
      --bg-secondary: #161616;
      --bg-tertiary: #232323;
      --text-primary: #ffffff;
      --text-secondary: #8a939b;
      --text-tertiary: #5a5f66;
      --accent: #2081e2;
      --accent-hover: #3a93ee;
      --success: #34c759;
      --border-subtle: #232830;
      --border-default: #333a42;
      --bar-track: #22262c;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-full: 9999px;
      --transition: 160ms ease;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .probe {
      width: 100%;
      max-width: 440px;
    }

    /* Header */
    .probe__head {
      text-align: center;
      margin-bottom: 28px;
    }

    .probe__eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .probe__title {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .probe__hint {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-secondary);
      max-width: 380px;
      margin: 0 auto;
    }

    /* Stat cards */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }

    .stat {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 16px 6px;
      text-align: center;
    }

    .stat__value {
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 600;
      line-height: 1.1;
      color: var(--text-primary);
    }

    .stat__value--sm {
      font-size: 16px;
    }

    .stat__label {
      margin-top: 7px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }

    .stat--bridge .stat__value {
      color: var(--text-secondary);
    }

    .stat--bridge.is-bridge .stat__value {
      color: var(--accent);
    }

    /* Action row */
    .probe__action {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 30px;
    }

    .btn {
      flex: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      padding: 11px 24px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
    }

    .btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .reach {
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--text-secondary);
    }

    .reach.is-complete {
      color: var(--success);
      font-weight: 600;
    }

    /* Cell distribution */
    .cells-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 14px;
    }

    .cell-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .cell-row__name {
      flex: none;
      width: 52px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-secondary);
    }

    .cell-row--me .cell-row__name {
      color: var(--accent);
    }

    .cell-row__bar {
      flex: 1;
      height: 8px;
      background: var(--bar-track);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .cell-row__fill {
      display: block;
      height: 100%;
      width: 0;
      background: var(--accent);
      border-radius: inherit;
      transition: width var(--transition);
    }

    .cell-note {
      font-size: 13px;
      color: var(--text-tertiary);
    }

    .cell-row__count {
      flex: none;
      width: 20px;
      text-align: right;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-primary);
    }

    @media (max-width: 420px) {
      .probe__title { font-size: 21px; }
      .stat__value { font-size: 19px; }
    }
  </style>
</head>

<body>
  <main class="probe">
    <div class="probe__head">
      <div class="probe__eyebrow">GenosDB · Cellular Mesh</div>
      <h1 class="probe__title">Reach Probe</h1>
      <p class="probe__hint">
        Open in several tabs — each is a peer. Past 10 peers the mesh splits
        into cells with elected bridges. Press <b>Ping</b>: every peer answers,
        and reach shows how many the broadcast reached across the cells.
      </p>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat__value" id="peers">1</div>
        <div class="stat__label" id="peersLabel">peers</div>
      </div>
      <div class="stat">
        <div class="stat__value" id="cells">1</div>
        <div class="stat__label">cells</div>
      </div>
      <div class="stat">
        <div class="stat__value stat__value--sm" id="mycell">–</div>
        <div class="stat__label">my cell</div>
      </div>
      <div class="stat stat--bridge" id="bridgeStat">
        <div class="stat__value" id="bridge">no</div>
        <div class="stat__label">bridge</div>
      </div>
    </div>

    <div class="probe__action">
      <button class="btn" id="pingbtn">Ping</button>
      <span class="reach" id="pingres">—</span>
    </div>

    <div class="cells-title">Cell distribution</div>
    <div id="list"></div>
  </main>

  <script type="module">
    // A GenosDB peer with Cellular Mesh enabled. It reports what it sees
    // (peers, cells, own role) and offers a reach probe: broadcasting "hello"
    // and counting the "world" replies measures real end-to-end delivery —
    // does the broadcast reach every peer across every cell? — plus latency.
    // Optional query params: ?room=<name>&size=<auto|N>&relay=<ws url,url>
    import { gdb } from "../dist/index.js";

    const q = new URLSearchParams(location.search);
    const room = q.get("room") ?? "mesh-reach-probe";
    const relay = q.get("relay"); // comma-separated relay URLs; empty = built-in
    const rtc = { cells: { cellSize: q.get("size") ?? "auto", bridgesPerEdge: 2 } };
    if (relay) rtc.relayUrls = relay.split(",");

    const db = await gdb(room, { rtc });
    window.db = db; // console probes

    const states = new Map(); // peerId -> last gossiped state (+ arrival time)
    // Fallback Servers announce type 'superpeer' on peer:join. They are pure
    // infrastructure — they run no app logic, so they never answer the probe.
    const peerTypes = new Map();
    const serverCount = () => [...states.keys()].filter(id => peerTypes.get(id) === "superpeer").length;
    let self = { cellId: null, isBridge: false };
    const $ = id => document.getElementById(id);

    const render = () => {
      const cutoff = Date.now() - 90000; // expire silent gossip-only peers
      for (const [id, st] of states) if (st.at < cutoff) states.delete(id);

      const byCell = new Map();
      const bump = (cell, id) => {
        if (!byCell.has(cell)) byCell.set(cell, new Set());
        byCell.get(cell).add(id);
      };
      bump(self.cellId ?? "cell-?", db.selfId);
      for (const [id, st] of states) bump(st.cell ?? "cell-?", id);

      $("peers").textContent = states.size + 1;
      const srv = serverCount();
      $("peersLabel").textContent = srv ? `peers · ${srv} srv` : "peers";
      $("cells").textContent = byCell.size;
      $("mycell").textContent = self.cellId?.replace("cell-", "C") ?? "–";
      $("bridge").textContent = self.isBridge ? "yes" : "no";
      $("bridgeStat").classList.toggle("is-bridge", !!self.isBridge);
      document.title = `${states.size + 1}p ${byCell.size}c ${self.cellId ?? ""}`;

      const rows = [...byCell.entries()].sort((a, b) => a[0].localeCompare(b[0]));
      if (rows.length < 2) {
        // A single cell isn't a distribution yet — say so instead of drawing
        // one lonely full bar.
        $("list").innerHTML = `<div class="cell-note">Single cell — the mesh splits past 10 peers.</div>`;
        return;
      }
      const max = Math.max(1, ...rows.map(([, ids]) => ids.size));
      $("list").innerHTML = rows.map(([c, ids]) => {
        const me = c === self.cellId;
        return `<div class="cell-row${me ? " cell-row--me" : ""}">
          <span class="cell-row__name">${c.replace("cell-", "cell ")}</span>
          <span class="cell-row__bar"><span class="cell-row__fill"></span></span>
          <span class="cell-row__count">${ids.size}</span>
        </div>`;
      }).join("");
      // The fill width is data — set it on the element (works without the
      // inline-style attribute a strict CSP would strip).
      $("list").querySelectorAll(".cell-row__fill").forEach((el, i) => {
        el.style.width = `${Math.round((rows[i][1].size / max) * 100)}%`;
      });
    };

    // Seed with the current engine state: the initial mesh:state fires
    // during join(), before this listener exists.
    self = db.room.getState?.() ?? self;
    db.room.on("mesh:state", st => { self = st; render(); });
    db.room.on("mesh:peer-state", st => {
      if (st.id === db.selfId) return;
      states.set(st.id, { ...st, at: Date.now() });
      render();
    });
    db.room.on("peer:join", (id, type) => { if (type) peerTypes.set(id, type); });
    db.room.on("peer:leave", id => { states.delete(id); peerTypes.delete(id); render(); });

    // Reach probe: broadcast "hello", every peer auto-answers "world".
    const mesh = db.room.mesh;
    let ping = null; // { id, t0, seen:Set, total } for the ping I originated

    const renderPing = () => {
      if (!ping) return;
      const dt = Math.round(performance.now() - ping.t0);
      const reached = ping.seen.size + 1; // +1: I originate it, so I always have it
      const done = ping.total > 0 && reached >= ping.total;
      $("pingres").textContent = `reach ${reached}/${ping.total} · ${dt}ms${done ? " ✓" : ""}`;
      $("pingres").classList.toggle("is-complete", done);
    };

    mesh.on("message", m => {
      if (!m || typeof m !== "object") return;
      if (m._p === "hello" && m.from !== db.selfId) {
        mesh.send({ _p: "world", to: m.id, from: db.selfId }); // auto-answer
      } else if (m._p === "world" && ping && m.to === ping.id) {
        ping.seen.add(m.from);
        renderPing();
      }
    });

    $("pingbtn").onclick = () => {
      // Denominator = peers that can answer: everyone incl. me, minus servers
      // (infrastructure runs no app logic). Snapshotted so it stays stable
      // mid-measure.
      ping = { id: `${db.selfId}:${Date.now()}`, t0: performance.now(), seen: new Set(), total: states.size + 1 - serverCount() };
      mesh.send({ _p: "hello", id: ping.id, from: db.selfId });
      renderPing();
    };

    setInterval(render, 5000); // ghost expiry pulse
    render();
  </script>
</body>

</html>
